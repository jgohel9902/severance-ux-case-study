    <rect x="675" y="300" width="250" height="42" rx="8" fill="#c46a5a"/>
    <text x="800" y="328" font-size="14" font-weight="700" fill="#f5f0e8" text-anchor="middle">MONEY (tab)</text>
    <g font-size="12" fill="#1a2332">
      <rect x="675" y="358" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="691" y="382">Runway calculator</text>
      <rect x="675" y="404" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="691" y="428">Subscription audit</text>
      <rect x="675" y="450" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="691" y="474">401(k) / RRSP rollover guide</text>
      <rect x="675" y="496" width="250" height="38" rx="6" fill="#fdf3e8" stroke="#d4a259"/>
      <text x="691" y="520" fill="#7a5a1a">Severance Reviewer ↗</text>
      <rect x="675" y="542" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="691" y="566">"Extend runway" suggestions</text>
      <rect x="675" y="588" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="691" y="612">Household income (deep-link)</text>
    </g>
  </g>

  <!-- DOCUMENTS tab (column 4) -->
  <g>
    <rect x="1050" y="300" width="250" height="42" rx="8" fill="#c46a5a"/>
    <text x="1175" y="328" font-size="14" font-weight="700" fill="#f5f0e8" text-anchor="middle">DOCUMENTS (tab)</text>
    <g font-size="12" fill="#1a2332">
      <rect x="1050" y="358" width="250" height="38" rx="6" fill="#fdf3e8" stroke="#d4a259"/>
      <text x="1066" y="382" fill="#7a5a1a">Severance Reviewer ↗</text>
      <rect x="1050" y="404" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="1066" y="428">Plain-language clause cards</text>
      <rect x="1050" y="450" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="1066" y="474">Annotated PDF view</text>
      <rect x="1050" y="496" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
