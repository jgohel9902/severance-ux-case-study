      <rect x="1050" y="542" width="250" height="38" rx="6" fill="#f0e8ed" stroke="#a3839c"/>
      <text x="1066" y="566" fill="#5a3a4f">Privacy: who sees what</text>
    </g>
  </g>

  <!-- MORE tab (column 5) → Health / Profile / Settings -->
