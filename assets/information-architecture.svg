      <rect x="1310" y="404" width="250" height="34" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="1340" y="426">COBRA vs. ACA decision tool</text>
      <rect x="1310" y="446" width="250" height="34" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="1340" y="468">Provider-network checker</text>
      <rect x="1310" y="488" width="250" height="34" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="1340" y="510">Prescription continuity</text>
      <rect x="1310" y="530" width="250" height="34" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="1340" y="552">Crisis &amp; mental-health routing</text>

      <rect x="1310" y="580" width="250" height="38" rx="6" fill="#e8f0ed" stroke="#9ec4b9"/>
      <text x="1326" y="604" font-weight="700" fill="#3e6e63">PROFILE</text>
      <rect x="1310" y="626" width="250" height="34" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="1340" y="648">Household composition</text>
      <rect x="1310" y="668" width="250" height="34" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="1340" y="690">Location (state / province)</text>
      <rect x="1310" y="710" width="250" height="34" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="1340" y="732">Severance details</text>
      <rect x="1310" y="752" width="250" height="34" rx="6" fill="#fff7e8" stroke="#d4a259"/>
      <text x="1340" y="774" fill="#7a5a1a">Visa status (v1.1)</text>
    </g>
  </g>

  <!-- Cross-listing arrow Severance Reviewer (Money ↔ Documents) -->
  <g stroke="#d4a259" stroke-width="2" fill="none" stroke-dasharray="6 4">
    <path d="M 925 515 C 990 515 990 377 1050 377"/>
  </g>
  <text x="970" y="448" font-size="11" fill="#7a5a1a" font-style="italic">cross-listed</text>

  <!-- Legend -->
  <g transform="translate(60 850)">
    <text font-size="14" font-weight="700" fill="#1a2332">Legend</text>
    <g transform="translate(0 16)" font-size="12" fill="#1a2332">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="#3e6e63"/>
      <text x="32" y="16">Always-visible navigation surface</text>

      <rect x="240" y="0" width="22" height="22" rx="4" fill="#c46a5a"/>
      <text x="272" y="16">High-stakes content (severance / money)</text>

      <rect x="540" y="0" width="22" height="22" rx="4" fill="#fdf3e8" stroke="#d4a259"/>
      <text x="572" y="16">Cross-listed surface (appears in 2+ places)</text>

      <rect x="840" y="0" width="22" height="22" rx="4" fill="#fff7e8" stroke="#d4a259"/>
      <text x="872" y="16">Conditional / time-sensitive content</text>

      <rect x="1180" y="0" width="22" height="22" rx="4" fill="#f0e8ed" stroke="#a3839c"/>
      <text x="1212" y="16">Privacy-sensitive surface</text>
    </g>
  </g>

  <!-- Tree-test results panel -->
  <g transform="translate(60 940)">
    <rect width="1480" height="120" rx="10" fill="#ffffff" stroke="#d4cab4"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#1a2332">Tree-test outcomes (v3, n=12)</text>
    <g font-size="12" fill="#2c3540">
      <text x="20" y="54">UI Filing Helper · 92% / 86%</text>
      <text x="220" y="54">Runway calculator · 100% / 100%</text>
      <text x="460" y="54">Severance review · 91% / 84% (after cross-list)</text>
      <text x="800" y="54">Spouse income · 88% / 78% (after deep-link)</text>
      <text x="1100" y="54">401(k) rollover · 85% / 76% (after rename)</text>

      <text x="20" y="80">Find tomorrow's plan · 92% / 86%</text>
      <text x="280" y="80">Cancel a subscription · 92% / 86%</text>
      <text x="540" y="80">Update state · 90% / 78% (after iconic affordance)</text>
      <text x="900" y="80" font-style="italic" fill="#8a8478">Numbers shown as: success / first-click correct</text>
    </g>
    <text x="20" y="104" font-size="10" fill="#8a8478" font-style="italic">v1 sitemap success: 67% avg · v3 success: 90% avg · gain driven by cross-listing and deep-linking, not navigation depth</text>
  </g>
</svg>
