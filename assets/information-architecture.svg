<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgIA" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f3ed"/>
      <stop offset="1" stop-color="#f0e9dd"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1100" fill="url(#bgIA)"/>

  <text x="60" y="60" font-size="32" font-weight="700" fill="#1a2332">Severance — Information Architecture (v3)</text>
  <text x="60" y="92" font-size="15" fill="#5a6470">Sitemap with content inventory · 5-tab bottom navigation · cross-listed surfaces noted</text>
  <text x="60" y="116" font-size="12" fill="#8a8478" font-style="italic">v3 = post tree-test corrections (Severance Reviewer cross-listed; Spouse income deep-linked from Money)</text>

  <!-- Root: HOME -->
  <g>
    <rect x="660" y="160" width="280" height="74" rx="12" fill="#1a2332"/>
    <text x="800" y="194" font-size="18" font-weight="700" fill="#f5f0e8" text-anchor="middle">HOME</text>
    <text x="800" y="216" font-size="12" fill="#d4a259" text-anchor="middle">30-Day Plan · today's action</text>
  </g>

  <!-- Connector lines from HOME to 5 tabs -->
  <g stroke="#a89e8a" stroke-width="1.6" fill="none">
    <path d="M 800 234 L 800 260 L 165 260 L 165 300"/>
    <path d="M 800 234 L 800 260 L 425 260 L 425 300"/>
    <path d="M 800 234 L 800 300"/>
    <path d="M 800 234 L 800 260 L 1175 260 L 1175 300"/>
    <path d="M 800 234 L 800 260 L 1435 260 L 1435 300"/>
  </g>

  <!-- 5 tab columns -->
  <!-- HOME tab content (column 1) -->
  <g>
    <rect x="40" y="300" width="250" height="42" rx="8" fill="#3e6e63"/>
    <text x="165" y="328" font-size="14" font-weight="700" fill="#f5f0e8" text-anchor="middle">HOME (tab)</text>
    <g font-size="12" fill="#1a2332">
      <rect x="40" y="358" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="56" y="382">Today's Action card</text>
      <rect x="40" y="404" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="56" y="428">Day timeline (1–30)</text>
      <rect x="40" y="450" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="56" y="474">Runway tile (one number)</text>
      <rect x="40" y="496" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="56" y="520">Calm Companion entry</text>
      <rect x="40" y="542" width="250" height="38" rx="6" fill="#fff7e8" stroke="#d4a259"/>
      <text x="56" y="566" fill="#7a5a1a">Filing-window banner *</text>
      <text x="56" y="592" font-size="9" fill="#8a8478" font-style="italic">* shows only if &lt; 72h to a deadline</text>
    </g>
  </g>

  <!-- PLAN tab (column 2) -->
  <g>
    <rect x="300" y="300" width="250" height="42" rx="8" fill="#3e6e63"/>
    <text x="425" y="328" font-size="14" font-weight="700" fill="#f5f0e8" text-anchor="middle">PLAN (tab)</text>
    <g font-size="12" fill="#1a2332">
      <rect x="300" y="358" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="316" y="382">Day-by-day timeline</text>
      <rect x="300" y="404" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="316" y="428">Filing windows (UI / COBRA / Sev.)</text>
      <rect x="300" y="450" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="316" y="474">Weekly check-in</text>
      <rect x="300" y="496" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="316" y="520">LinkedIn post timing</text>
      <rect x="300" y="542" width="250" height="38" rx="6" fill="#ffffff" stroke="#d4cab4"/>
      <text x="316" y="566">Day 30 wrap-up</text>
    </g>
